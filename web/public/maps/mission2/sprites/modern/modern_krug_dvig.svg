<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 170 108" xmlns="http://www.w3.org/2000/svg" width="130" height="83">
<defs>
  <radialGradient id="rbg" cx="42%" cy="38%">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/>
  </radialGradient>
  <filter id="rsf"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity=".4"/></filter>
  <linearGradient id="rpg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7b8794"/><stop offset="45%" stop-color="#dde2e8"/>
    <stop offset="100%" stop-color="#7b8794"/>
  </linearGradient>
</defs>
<!-- Post ball/base on left -->
<ellipse cx="10" cy="54" rx="8" ry="8" fill="#4b5563"/>
<ellipse cx="10" cy="54" rx="6" ry="6" fill="#6b7280"/>
<ellipse cx="8" cy="52" rx="2.5" ry="2" fill="#9ca3af" opacity=".5"/>
<!-- Horizontal post arm -->
<rect x="10" y="50" width="52" height="8" rx="4" fill="url(#rpg)"/>
<!-- Blue circle sign -->
<circle cx="93" cy="54" r="40" fill="url(#rbg)" filter="url(#rsf)"/>
<circle cx="93" cy="54" r="40" fill="none" stroke="white" stroke-width="4.5"/>
<!-- Rotation arrows (clockwise) using circle-arcs centered ~(93,54) r=22 -->
<!-- Arrow 1: 250°→10° -->
<path d="M 85,33 A 22,22 0 0 1 115,57" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="115,57 121,48 111,46" fill="white"/>
<!-- Arrow 2: 130°→250° -->
<path d="M 79,71 A 22,22 0 0 1 85,33" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="85,33 94,35 91,25" fill="white"/>
<!-- Arrow 3: 10°→130° -->
<path d="M 115,57 A 22,22 0 0 1 79,71" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="79,71 76,62 70,70" fill="white"/>
<!-- Center dot -->
<circle cx="93" cy="54" r="10" fill="url(#rbg)"/>
<!-- Red yield triangle: base at right edge of circle (133), apex pointing right -->
<!-- Outer red -->
<polygon points="131,18 131,90 165,54" fill="#dc2626" filter="url(#rsf)"/>
<!-- Inner white -->
<polygon points="136,26 136,82 159,54" fill="white"/>
<!-- Red border line on base to seal join with circle -->
<line x1="131" y1="18" x2="131" y2="90" stroke="#dc2626" stroke-width="2"/>
</svg>
