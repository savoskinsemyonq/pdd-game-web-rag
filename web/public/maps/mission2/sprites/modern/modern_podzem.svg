<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 125 110" xmlns="http://www.w3.org/2000/svg" width="118" height="104">
<defs>
  <linearGradient id="tunig" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#070707"/><stop offset="80%" stop-color="#111"/>
    <stop offset="100%" stop-color="#1e1e1e"/>
  </linearGradient>
  <linearGradient id="tunwg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6b7280"/><stop offset="100%" stop-color="#4b5563"/>
  </linearGradient>
  <filter id="tunf"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity=".5"/></filter>
</defs>
<!-- Wall border -->
<path d="M6,5 L119,5 L96,105 L29,105 Z" fill="url(#tunwg)" stroke="#374151" stroke-width="2.5"/>
<!-- Tunnel interior -->
<path d="M14,11 L111,11 L89,99 L36,99 Z" fill="url(#tunig)" filter="url(#tunf)"/>
<!-- Light at opening -->
<path d="M14,11 L111,11 L105,30 L20,30 Z" fill="white" opacity=".04"/>
<!-- Center divider marking -->
<line x1="62" y1="13" x2="59" y2="42" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="8,5" stroke-linecap="round" opacity=".8"/>
<line x1="63" y1="13" x2="66" y2="42" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="8,5" stroke-linecap="round" opacity=".8"/>
<!-- Entry lip highlight -->
<line x1="14" y1="11" x2="111" y2="11" stroke="#9ca3af" stroke-width="3.5"/>
<!-- Wall edge lines -->
<line x1="6" y1="5" x2="119" y2="5" stroke="#6b7280" stroke-width="2.5"/>
</svg>
