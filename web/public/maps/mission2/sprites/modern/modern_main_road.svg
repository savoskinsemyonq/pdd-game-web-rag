<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 135" xmlns="http://www.w3.org/2000/svg" width="90" height="122">
<defs>
  <linearGradient id="mpg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9ca3af"/><stop offset="45%" stop-color="#e5e7eb"/>
    <stop offset="100%" stop-color="#9ca3af"/>
