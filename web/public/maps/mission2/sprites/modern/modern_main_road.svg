</defs>
<ellipse cx="50" cy="129" rx="9" ry="4.5" fill="#374151" opacity=".5"/>
<rect x="47" y="82" width="6" height="49" rx="3" fill="url(#mpg)"/>
<!-- White border diamond -->
<rect x="10" y="10" width="80" height="80" rx="5" transform="rotate(45 50 50)" fill="white" filter="url(#mf)"/>
<!-- Yellow fill diamond -->
<rect x="15" y="15" width="70" height="70" rx="4" transform="rotate(45 50 50)" fill="url(#ydiamond)"/>
