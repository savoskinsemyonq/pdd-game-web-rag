  <filter id="mf"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity=".4"/></filter>
  <linearGradient id="ydiamond" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#f59e0b"/>
