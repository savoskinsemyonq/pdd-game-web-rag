<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg" width="118" height="118">
<defs>
  <filter id="hsf"><feDropShadow dx="3" dy="4" stdDeviation="4" flood-opacity=".45"/></filter>
  <linearGradient id="gwall2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2d9e50"/><stop offset="100%" stop-color="#1a7a38"/>
  </linearGradient>
</defs>
<!-- Drop shadow -->
<path d="M62,8 L116,34 L116,90 L62,112 L8,90 L8,34 Z" fill="#000" opacity=".22" transform="translate(4,5)" filter="url(#hsf)"/>
<!-- Outer green walls -->
<path d="M62,8 L116,34 L116,90 L62,112 L8,90 L8,34 Z" fill="url(#gwall2)" stroke="#145228" stroke-width="2.5"/>
<!-- Hip roof: 4 panels from center point -->
<!-- Far panel (top/back — lightest, catches sky) -->
<path d="M8,34 L116,34 L62,62 Z" fill="#e8673a"/>
<!-- Left panel -->
<path d="M8,34 L8,90 L62,62 Z" fill="#c2501e"/>
<!-- Right panel -->
<path d="M116,34 L116,90 L62,62 Z" fill="#c2501e"/>
<!-- Near panel (bottom/front — darkest) -->
<path d="M8,90 L116,90 L62,62 Z" fill="#933a10"/>
<!-- Roof tile lines on far panel -->
<line x1="35" y1="34" x2="62" y2="62" stroke="#c2501e" stroke-width="1" opacity=".5"/>
<line x1="62" y1="34" x2="62" y2="62" stroke="#c2501e" stroke-width="1" opacity=".5"/>
<line x1="89" y1="34" x2="62" y2="62" stroke="#c2501e" stroke-width="1" opacity=".5"/>
<!-- Roof tile lines on near panel -->
<line x1="35" y1="90" x2="62" y2="62" stroke="#752e0c" stroke-width="1" opacity=".5"/>
<line x1="62" y1="90" x2="62" y2="62" stroke="#752e0c" stroke-width="1" opacity=".5"/>
<line x1="89" y1="90" x2="62" y2="62" stroke="#752e0c" stroke-width="1" opacity=".5"/>
<!-- Ridge peak -->
<circle cx="62" cy="62" r="3.5" fill="#5c2508" opacity=".8"/>
<!-- Chimney (top of far panel) -->
<rect x="54" y="26" width="13" height="15" rx="2" fill="#8a6040"/>
<rect x="54" y="26" width="13" height="5" rx="1.5" fill="#6a4828"/>
<!-- Chimney smoke puffs -->
<circle cx="58" cy="21" r="3.5" fill="#9ca3af" opacity=".45"/>
<circle cx="63" cy="16" r="4.5" fill="#9ca3af" opacity=".3"/>
<circle cx="60" cy="10" r="3" fill="#9ca3af" opacity=".2"/>
<!-- Windows: right panel (two square windows) -->
<rect x="88" y="40" width="17" height="14" rx="2.5" fill="#bde0f8" stroke="#8b3c14" stroke-width="1.5"/>
<line x1="96.5" y1="40" x2="96.5" y2="54" stroke="#8b3c14" stroke-width="1.5"/>
<line x1="88" y1="47" x2="105" y2="47" stroke="#8b3c14" stroke-width="1.5"/>
<rect x="88" y="68" width="17" height="14" rx="2.5" fill="#bde0f8" stroke="#8b3c14" stroke-width="1.5"/>
<line x1="96.5" y1="68" x2="96.5" y2="82" stroke="#8b3c14" stroke-width="1.5"/>
<line x1="88" y1="75" x2="105" y2="75" stroke="#8b3c14" stroke-width="1.5"/>
<!-- Window glass glare -->
<rect x="89" y="41" width="6" height="5" rx="1" fill="white" opacity=".35"/>
<rect x="89" y="69" width="6" height="5" rx="1" fill="white" opacity=".35"/>
<!-- Door: near panel, front center -->
<rect x="51" y="92" width="22" height="18" rx="2.5" fill="#6b2e0e"/>
<rect x="51" y="92" width="22" height="6" rx="1.5" fill="#7c3610" opacity=".8"/>
<!-- Door arch -->
<path d="M51,98 A11,8 0 0,1 73,98" fill="#5a2208"/>
<!-- Door knob -->
<circle cx="70" cy="101" r="2" fill="#d4a82a"/>
<!-- Door window -->
<rect x="57" y="94" width="10" height="8" rx="1.5" fill="#bde0f8" opacity=".7"/>
</svg>
