<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 135 115" xmlns="http://www.w3.org/2000/svg" width="128" height="109">
<defs>
  <filter id="nf"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity=".35"/></filter>
  <linearGradient id="npg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9ca3af"/><stop offset="50%" stop-color="#e5e7eb"/>
    <stop offset="100%" stop-color="#9ca3af"/>
  </linearGradient>
</defs>
<!-- Post (horizontal arm) -->
<ellipse cx="15" cy="57" rx="6" ry="6" fill="#374151" opacity=".5"/>
<rect x="15" y="54" width="38" height="6" rx="3" fill="url(#npg)"/>
<!-- Sign triangle -->
<polygon points="78,5 130,100 26,100" fill="white" filter="url(#nf)"/>
<polygon points="78,5 130,100 26,100" fill="none" stroke="#dc2626" stroke-width="11" stroke-linejoin="round"/>
<polygon points="78,16 120,92 36,92" fill="white"/>
<!-- Slope road line: flat then rising -->
<polyline points="38,84 68,84 102,46" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Tick at start (flat ground) -->
<line x1="38" y1="80" x2="38" y2="88" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<!-- Tick at top of slope -->
<line x1="98" y1="43" x2="106" y2="49" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<!-- 10% label -->
<text x="90" y="78" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="18" fill="#374151">10%</text>
</svg>
