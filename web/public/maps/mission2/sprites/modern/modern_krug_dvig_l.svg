<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 170 108" xmlns="http://www.w3.org/2000/svg" width="130" height="83">
<defs>
  <radialGradient id="rbg2" cx="58%" cy="38%">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/>
  </radialGradient>
  <filter id="rsf2"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity=".4"/></filter>
  <linearGradient id="rpg2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7b8794"/><stop offset="45%" stop-color="#dde2e8"/>
    <stop offset="100%" stop-color="#7b8794"/>
  </linearGradient>
</defs>
<!-- Red yield triangle: base at left edge of circle (37), apex pointing LEFT -->
<!-- Outer red -->
<polygon points="39,18 39,90 5,54" fill="#dc2626" filter="url(#rsf2)"/>
<!-- Inner white -->
<polygon points="34,26 34,82 11,54" fill="white"/>
<line x1="39" y1="18" x2="39" y2="90" stroke="#dc2626" stroke-width="2"/>
<!-- Blue circle sign -->
<circle cx="77" cy="54" r="40" fill="url(#rbg2)" filter="url(#rsf2)"/>
<circle cx="77" cy="54" r="40" fill="none" stroke="white" stroke-width="4.5"/>
<!-- Rotation arrows (clockwise) center (77,54) r=22 -->
<!-- Arrow 1: 250°→10° -->
<path d="M 69,33 A 22,22 0 0 1 99,57" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="99,57 105,48 95,46" fill="white"/>
<!-- Arrow 2: 130°→250° -->
<path d="M 63,71 A 22,22 0 0 1 69,33" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="69,33 78,35 75,25" fill="white"/>
<!-- Arrow 3: 10°→130° -->
<path d="M 99,57 A 22,22 0 0 1 63,71" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
<polygon points="63,71 60,62 54,70" fill="white"/>
<!-- Center dot -->
<circle cx="77" cy="54" r="10" fill="url(#rbg2)"/>
<!-- Horizontal post arm on right -->
<rect x="108" y="50" width="52" height="8" rx="4" fill="url(#rpg2)"/>
<!-- Post ball/base on right -->
<ellipse cx="160" cy="54" rx="8" ry="8" fill="#4b5563"/>
<ellipse cx="160" cy="54" rx="6" ry="6" fill="#6b7280"/>
<ellipse cx="158" cy="52" rx="2.5" ry="2" fill="#9ca3af" opacity=".5"/>
</svg>
