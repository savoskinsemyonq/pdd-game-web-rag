<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 135 115" xmlns="http://www.w3.org/2000/svg" width="128" height="109">
<defs>
  <filter id="wf"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity=".35"/></filter>
  <pattern id="bstripe" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="5" height="10" fill="#dc2626"/>
    <rect x="5" width="5" height="10" fill="white"/>
  </pattern>
  <radialGradient id="rwbg" cx="40%" cy="38%">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/>
  </radialGradient>
</defs>
<!-- Construction barrier -->
<rect x="4" y="32" width="44" height="56" rx="4" fill="url(#bstripe)" filter="url(#wf)"/>
<rect x="4" y="32" width="44" height="56" rx="4" fill="none" stroke="#991b1b" stroke-width="2.5"/>
<!-- Barrier legs -->
<rect x="9" y="85" width="10" height="14" rx="3" fill="#6b7280"/>
<rect x="34" y="85" width="10" height="14" rx="3" fill="#6b7280"/>
<!-- Blue directional sign (top right) -->
<circle cx="100" cy="33" r="30" fill="url(#rwbg)" filter="url(#wf)"/>
<circle cx="100" cy="33" r="30" fill="none" stroke="white" stroke-width="4.5"/>
<!-- Arrow up-right in circle -->
<path d="M 90,50 L 90,22 L 118,22" fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="118,22 106,13 119,10" fill="white"/>
<!-- Warning triangle (bottom right) -->
<polygon points="100,65 130,112 70,112" fill="white" filter="url(#wf)"/>
<polygon points="100,65 130,112 70,112" fill="none" stroke="#dc2626" stroke-width="9" stroke-linejoin="round"/>
<polygon points="100,74 124,108 76,108" fill="white"/>
<!-- Road worker icon -->
<circle cx="100" cy="83" r="4.5" fill="#374151"/>
<path d="M100,88 L96,101 M100,88 L104,101" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
<path d="M93,93 L107,93" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
</svg>
