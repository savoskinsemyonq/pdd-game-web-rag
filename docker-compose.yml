services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pdd_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./web/server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdd_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  rag-api:
    build:
      context: ./pdd-rag
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./web/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+asyncpg://postgres:secret@postgres/pdd_rag
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      SKIP_ML_MODELS: ${SKIP_ML_MODELS:-0}
      WARMUP_MODELS: ${WARMUP_MODELS:-1}
      # SKIP_RERANKER, RERANKER_MODEL, RERANKER_THRESHOLD — из web/.env (env_file)
      AUTO_INGEST: ${AUTO_INGEST:-1}
      TTS_WARMUP: ${TTS_WARMUP:-1}
      TORCH_HOME: /root/.cache/torch
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./полные_pdd.rtf:/app/data/pdd.rtf:ro
      - ./штрафы_ПДД.csv:/app/data/fines.csv:ro
      - ./pdd-rag/rag_eval:/app/rag_eval:ro
      - ./pdd-rag/scripts/install_eval.sh:/app/scripts/install_eval.sh:ro
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  qdrant_data:
  pg_data:
  hf_cache:
